<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👑✨ Süper Admin Panel - H-Sound</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1A1A1A 0%, #0D0D0D 100%);
            color: #ffffff;
            min-height: 100vh;
        }

        /* Login Screen */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-box {
            background: #2C2C2C;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            border: 2px solid #E74C3C;
            box-shadow: 0 0 30px rgba(231, 76, 60, 0.3);
            max-width: 400px;
            width: 100%;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            color: #E74C3C;
            font-size: 32px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(231, 76, 60, 0.5);
        }

        .login-header p {
            color: #A9A9A9;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #E74C3C;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            background: #1A1A1A;
            border: 2px solid #3C3C3C;
            border-radius: 8px;
            color: #ffffff;
            font-size: 14px;
            transition: border 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #E74C3C;
            box-shadow: 0 0 10px rgba(231, 76, 60, 0.3);
        }

        .password-wrapper {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #A9A9A9;
            font-size: 18px;
            transition: color 0.3s;
        }

        .toggle-password:hover {
            color: #3498DB;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #E74C3C 0%, #C0392B 100%);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 20px rgba(231, 76, 60, 0.4);
        }

        .login-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(231, 76, 60, 0.6);
        }

        .error-message {
            background: #E74C3C;
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            text-align: center;
        }

        /* Admin Panel */
        .admin-panel {
            display: none;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px;
            background: rgba(231, 76, 60, 0.1);
            border-radius: 15px;
            border: 2px solid #E74C3C;
            box-shadow: 0 0 30px rgba(231, 76, 60, 0.2);
            margin-bottom: 30px;
        }

        .header-left h1 {
            color: #E74C3C;
            font-size: 32px;
            margin-bottom: 5px;
            text-shadow: 0 0 20px rgba(231, 76, 60, 0.5);
        }

        .header-left p {
            color: #A9A9A9;
        }

        .logout-btn {
            background: #E74C3C;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #2C2C2C;
            padding: 25px;
            border-radius: 10px;
            border-left: 4px solid #3498DB;
        }

        .stat-card h3 {
            font-size: 36px;
            color: #3498DB;
            margin-bottom: 8px;
        }

        .stat-card p {
            color: #A9A9A9;
        }

        .users-table {
            background: #2C2C2C;
            border-radius: 10px;
            overflow: hidden;
        }

        .table-header {
            background: #3498DB;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .refresh-btn {
            background: white;
            color: #3498DB;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            padding: 15px;
            text-align: left;
            background: #1A1A1A;
            color: #3498DB;
            font-weight: 600;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #3C3C3C;
        }

        tbody tr:hover {
            background: #3C3C3C;
        }

        .badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-superadmin {
            background: linear-gradient(135deg, #9B59B6 0%, #E74C3C 100%);
            color: white;
            box-shadow: 0 0 15px rgba(155, 89, 182, 0.6);
            font-weight: 700;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 15px rgba(155, 89, 182, 0.6); }
            50% { box-shadow: 0 0 25px rgba(155, 89, 182, 0.9); }
        }

        .badge-admin {
            background: #9B59B6;
            color: white;
        }

        .badge-user {
            background: #27AE60;
            color: white;
        }

        .badge-premium {
            background: linear-gradient(135deg, #F39C12 0%, #E67E22 100%);
            color: white;
        }

        .badge-vip {
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            color: white;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .badge-banned {
            background: #E74C3C;
            color: white;
        }

        .action-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            margin: 0 3px;
            transition: transform 0.2s;
            min-height: 32px; /* Touch-friendly */
        }

        .action-btn:hover {
            transform: scale(1.05);
        }

        .action-btn:active {
            transform: scale(0.95);
        }

        .btn-ban {
            background: #E74C3C;
            color: white;
        }

        .btn-unban {
            background: #27AE60;
            color: white;
        }

        .btn-delete {
            background: #95A5A6;
            color: white;
        }

        .btn-edit {
            background: #3498DB;
            color: white;
        }

        .btn-role {
            background: #9B59B6;
            color: white;
        }

        .password-cell {
            font-family: monospace;
            color: #E74C3C;
            font-weight: 600;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #A9A9A9;
        }

        /* ========================================
           RESPONSIVE DESIGN - MOBILE
           ======================================== */

        @media (max-width: 768px) {
            /* Login Box */
            .login-box {
                padding: 30px 20px;
                max-width: 90%;
            }

            .login-header h1 {
                font-size: 24px;
            }

            /* Admin Panel */
            .container {
                padding: 10px;
            }

            /* Header */
            .header {
                flex-direction: column;
                gap: 15px;
                padding: 20px;
            }

            .header-left h1 {
                font-size: 24px;
            }

            .header > div:last-child {
                width: 100%;
                flex-direction: column;
            }

            .logout-btn {
                width: 100%;
                justify-content: center;
            }

            /* Stats */
            .stats {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }

            .stat-card {
                padding: 15px;
            }

            .stat-card h3 {
                font-size: 28px;
            }

            .stat-card p {
                font-size: 12px;
            }

            /* Table Header */
            .table-header {
                flex-direction: column;
                gap: 10px;
                padding: 15px;
            }

            .table-header h2 {
                font-size: 18px;
            }

            .refresh-btn {
                width: 100%;
            }

            /* Table - Scroll horizontal */
            .users-table {
                overflow-x: auto;
                position: relative;
            }

            .users-table::after {
                content: '← Kaydırın →';
                position: absolute;
                bottom: 10px;
                right: 10px;
                background: rgba(52, 152, 219, 0.9);
                color: white;
                padding: 5px 10px;
                border-radius: 5px;
                font-size: 11px;
                pointer-events: none;
                animation: fadeInOut 3s infinite;
            }

            @keyframes fadeInOut {
                0%, 100% { opacity: 0; }
                50% { opacity: 1; }
            }

            table {
                min-width: 800px;
                font-size: 12px;
            }

            th, td {
                padding: 10px 8px;
                white-space: nowrap;
            }

            .password-cell {
                font-size: 11px;
            }

            .badge {
                font-size: 10px;
                padding: 4px 8px;
            }

            .action-btn {
                padding: 5px 8px;
                font-size: 10px;
                margin: 2px;
            }
        }

        @media (max-width: 480px) {
            /* Login */
            .login-header h1 {
                font-size: 20px;
            }

            .form-group label {
                font-size: 13px;
            }

            .form-group input {
                font-size: 13px;
                padding: 10px;
            }

            .login-btn {
                font-size: 14px;
                padding: 12px;
            }

            /* Stats - Single Column */
            .stats {
                grid-template-columns: 1fr;
            }

            /* Header */
            .header-left h1 {
                font-size: 20px;
            }

            .header-left p {
                font-size: 13px;
            }

            /* Table */
            table {
                font-size: 11px;
            }

            th, td {
                padding: 8px 5px;
            }

            .action-btn {
                padding: 4px 6px;
                font-size: 9px;
            }

            .action-btn i {
                display: none;
            }
        }

        /* Landscape Mode */
        @media (max-width: 768px) and (orientation: landscape) {
            .stats {
                grid-template-columns: repeat(4, 1fr);
            }

            .header {
                flex-direction: row;
                justify-content: space-between;
            }

            .header > div:last-child {
                width: auto;
                flex-direction: row;
            }

            .logout-btn {
                width: auto;
            }
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div class="login-container" id="loginScreen">
        <div class="login-box">
            <div class="login-header">
                <h1><i class="fas fa-crown"></i>✨ Süper Admin Girişi</h1>
                <p>H-Sound Sistem Yönetimi</p>
            </div>
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> Kullanıcı Adı</label>
                    <input type="text" id="adminUsername" placeholder="Admin kullanıcı adı" required lang="tr" autocomplete="off" autocorrect="off" spellcheck="false">
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Şifre</label>
                    <div class="password-wrapper">
                        <input type="password" id="adminPassword" placeholder="Admin şifresi" required lang="tr" autocomplete="off">
                        <i class="toggle-password fas fa-eye-slash" onclick="toggleAdminPassword()"></i>
                    </div>
                </div>
                <button type="submit" class="login-btn">
                    <i class="fas fa-sign-in-alt"></i> Giriş Yap
                </button>
                <div id="loginError"></div>
            </form>
        </div>
    </div>

    <!-- Admin Panel -->
    <div class="admin-panel" id="adminPanel">
        <div class="container">
            <div class="header">
                <div class="header-left">
                    <h1><i class="fas fa-crown"></i>✨ Süper Admin Panel</h1>
                    <p>Hoş geldin, <span id="adminName"></span>!</p>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button class="logout-btn" style="background: #3498DB;" onclick="goToHSound()">
                        <i class="fas fa-music"></i> H-Sound'a Giriş Yap
                    </button>
                    <button class="logout-btn" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i> Çıkış Yap
                    </button>
                </div>
            </div>

            <div class="stats">
                <div class="stat-card">
                    <h3 id="totalUsers">0</h3>
                    <p><i class="fas fa-users"></i> Toplam Kullanıcı</p>
                </div>
                <div class="stat-card">
                    <h3 id="activeUsers">0</h3>
                    <p><i class="fas fa-check-circle"></i> Aktif Kullanıcı</p>
                </div>
                <div class="stat-card">
                    <h3 id="bannedUsers">0</h3>
                    <p><i class="fas fa-ban"></i> Banlı Kullanıcı</p>
                </div>
                <div class="stat-card">
                    <h3 id="adminCount">0</h3>
                    <p><i class="fas fa-crown"></i> Admin Sayısı</p>
                </div>
            </div>

            <div class="users-table">
                <div class="table-header">
                    <h2><i class="fas fa-list"></i> Kullanıcı Yönetimi</h2>
                    <button class="refresh-btn" onclick="loadUsers()">
                        <i class="fas fa-sync-alt"></i> Yenile
                    </button>
                </div>
                <div id="tableContent">
                    <div class="loading">
                        <i class="fas fa-spinner fa-spin" style="font-size: 40px;"></i>
                        <p>Yükleniyor...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://h-sound.onrender.com';

        let adminCredentials = null;
        let users = []; // Global users array

        // Sayfa yüklendiğinde otomatik giriş kontrolü
        window.addEventListener('DOMContentLoaded', async () => {
            const sessionToken = localStorage.getItem('h_sound_admin_session');
            const username = localStorage.getItem('h_sound_username');
            const role = localStorage.getItem('h_sound_role');
            
            // Eğer session token varsa veya kullanıcı admin/superadmin ise otomatik giriş yap
            if (sessionToken || (username && (role === 'admin' || role === 'superadmin'))) {
                console.log('🔐 Otomatik giriş yapılıyor...', { username, role });
                
                // Otomatik giriş başarılı - şifre istemeden gir
                adminCredentials = {
                    username: username || 'Admin',
                    role: role || 'superadmin'
                };
                
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                document.getElementById('adminName').textContent = username || 'Admin';
                
                // Kullanıcıları yükle
                loadUsers();
                
                console.log('✅ Otomatik admin girişi başarılı!');
                
                // Session token'ı temizle (tek kullanımlık)
                if (sessionToken) {
                    localStorage.removeItem('h_sound_admin_session');
                }
            }
        });

        // Şifre göster/gizle
        function toggleAdminPassword() {
            const input = document.getElementById('adminPassword');
            const icon = document.querySelector('.toggle-password');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            }
        }

        async function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('adminUsername').value;
            const password = document.getElementById('adminPassword').value;
            const errorDiv = document.getElementById('loginError');

            try {
                const response = await fetch(`${API_URL}/api/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    adminCredentials = { username, password };
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('adminPanel').style.display = 'block';
                    document.getElementById('adminName').textContent = username;
                    loadUsers();
                } else {
                    errorDiv.innerHTML = `<div class="error-message">${data.message}</div>`;
                }
            } catch (error) {
                errorDiv.innerHTML = '<div class="error-message">Sunucuya bağlanılamadı!</div>';
            }
        }

        function logout() {
            adminCredentials = null;
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('adminUsername').value = '';
            document.getElementById('adminPassword').value = '';
        }

        function goToHSound() {
            if (!adminCredentials) {
                alert('Oturum bilgisi bulunamadı!');
                return;
            }

            // Admin bilgilerini localStorage'a kaydet
            localStorage.setItem('h_sound_username', adminCredentials.username);
            localStorage.setItem('h_sound_email', 'alparmaklih@gmail.com'); // Admin e-postası
            localStorage.setItem('h_sound_logged_in', 'true');
            localStorage.setItem('h_sound_login_time', new Date().toLocaleString('tr-TR'));

            // H-Sound'a yönlendir
            window.location.href = 'music-player.html';
        }

        async function loadUsers() {
            if (!adminCredentials) return;

            try {
                console.log('🔄 Kullanıcılar yükleniyor...');
                
                const response = await fetch(`${API_URL}/api/admin/users`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        adminUsername: adminCredentials.username,
                        adminPassword: adminCredentials.password
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: Render sunucusu uyuyor olabilir, 1 dakika bekleyin.`);
                }

                const data = await response.json();

                if (data.success) {
                    displayUsers(data.users);
                    updateStats(data.users);
                    console.log('✅ Kullanıcılar yüklendi');
                } else {
                    alert('❌ ' + data.message);
                }
            } catch (error) {
                console.error('❌ Hata:', error);
                alert('❌ Kullanıcılar yüklenemedi!\n\nRender sunucusu uyuyor olabilir.\n\n1. https://h-sound.onrender.com adresini tarayıcıda aç\n2. 1 dakika bekle\n3. Tekrar yenile');
            }
        }

        function displayUsers(usersData) {
            // Global users değişkenini güncelle
            users = usersData;
            const tableContent = document.getElementById('tableContent');
            
            // Mevcut kullanıcının rolünü al
            const currentUserRole = localStorage.getItem('h_sound_role') || 'user';
            const isSuperAdmin = currentUserRole === 'superadmin';

            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Kullanıcı Adı</th>
                            <th>E-posta</th>
                            <th>Şifre</th>
                            <th>Rol</th>
                            <th>Durum</th>
                            <th>İşlemler</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            users.forEach((user, index) => {
                const isAdmin = user.role === 'admin' || user.role === 'superadmin';
                const isBanned = user.banned;
                
                // Rol badge'i
                let roleBadge = '';
                let roleText = '';
                switch(user.role) {
                    case 'superadmin':
                        roleBadge = 'badge-superadmin';
                        roleText = '👑✨ Süper Admin';
                        break;
                    case 'admin':
                        roleBadge = 'badge-admin';
                        roleText = '👑 Admin';
                        break;
                    case 'premium':
                        roleBadge = 'badge-premium';
                        roleText = '⭐ Premium';
                        break;
                    case 'vip':
                        roleBadge = 'badge-vip';
                        roleText = '💎 VIP';
                        break;
                    default:
                        roleBadge = 'badge-user';
                        roleText = '👤 Kullanıcı';
                }
                
                html += `
                    <tr>
                        <td>${index + 1}</td>
                        <td><i class="fas fa-user"></i> ${user.username}</td>
                        <td><i class="fas fa-envelope"></i> ${user.email}</td>
                        <td class="password-cell">${isSuperAdmin ? user.password : '••••••••'}</td>
                        <td>
                            <span class="badge ${roleBadge}">
                                ${roleText}
                            </span>
                        </td>
                        <td>
                            ${isBanned ? '<span class="badge badge-banned">Banlı</span>' : '<span class="badge badge-user">Aktif</span>'}
                        </td>
                        <td>
                            ${isAdmin ? `
                                <!-- Admin kendi rolünü değiştirebilir -->
                                <button class="action-btn btn-role" onclick="changeRole('${user.username}')">
                                    <i class="fas fa-crown"></i> Rol
                                </button>
                                <button class="action-btn btn-edit" onclick="changePassword('${user.username}')">
                                    <i class="fas fa-key"></i> Şifre
                                </button>
                            ` : `
                                <button class="action-btn ${isBanned ? 'btn-unban' : 'btn-ban'}" 
                                        onclick="toggleBan('${user.username}', ${!isBanned})">
                                    <i class="fas fa-${isBanned ? 'check' : 'ban'}"></i> ${isBanned ? 'Unban' : 'Ban'}
                                </button>
                                <button class="action-btn btn-role" onclick="changeRole('${user.username}')">
                                    <i class="fas fa-crown"></i> Rol
                                </button>
                                <button class="action-btn btn-edit" onclick="changePassword('${user.username}')">
                                    <i class="fas fa-key"></i> Şifre
                                </button>
                                <button class="action-btn btn-delete" onclick="deleteUser('${user.username}')">
                                    <i class="fas fa-trash"></i> Sil
                                </button>
                            `}
                        </td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            tableContent.innerHTML = html;
        }

        function updateStats(users) {
            document.getElementById('totalUsers').textContent = users.length;
            document.getElementById('activeUsers').textContent = users.filter(u => !u.banned).length;
            document.getElementById('bannedUsers').textContent = users.filter(u => u.banned).length;
            document.getElementById('adminCount').textContent = users.filter(u => u.role === 'admin' || u.role === 'superadmin').length;
        }

        async function toggleBan(username, banned) {
            if (!confirm(`${username} kullanıcısını ${banned ? 'banlamak' : 'ban kaldırmak'} istediğinize emin misiniz?`)) return;

            try {
                const response = await fetch(`${API_URL}/api/admin/ban-user`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        adminUsername: adminCredentials.username,
                        adminPassword: adminCredentials.password,
                        targetUsername: username,
                        banned
                    })
                });

                const data = await response.json();
                alert(data.message);
                if (data.success) loadUsers();
            } catch (error) {
                alert('İşlem başarısız!');
            }
        }

        async function deleteUser(username) {
            // İlk onay
            const firstConfirm = confirm(
                `⚠️ UYARI: ${username} kullanıcısını silmek üzeresiniz!\n\n` +
                `Bu işlem:\n` +
                `• Kullanıcının tüm verilerini silecek\n` +
                `• Tüm çalma listelerini silecek\n` +
                `• GERİ ALINAMAZ\n\n` +
                `Devam etmek istiyor musunuz?`
            );
            
            if (!firstConfirm) return;
            
            // Şifre onayı
            const password = prompt(
                `🔐 Güvenlik Onayı\n\n` +
                `${username} kullanıcısını silmek için kendi şifrenizi girin:\n\n` +
                `(Admin: ${adminCredentials.username})`
            );
            
            if (!password) return;
            
            // Şifre kontrolü
            if (password !== adminCredentials.password) {
                alert('❌ Hatalı şifre! İşlem iptal edildi.');
                return;
            }
            
            // Son onay
            const finalConfirm = confirm(
                `🚨 SON ONAY 🚨\n\n` +
                `${username} kullanıcısı KALİCİ OLARAK silinecek!\n\n` +
                `Bu işlem geri alınamaz. Emin misiniz?`
            );
            
            if (!finalConfirm) return;

            try {
                const response = await fetch(`${API_URL}/api/admin/delete-user`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        adminUsername: adminCredentials.username,
                        adminPassword: adminCredentials.password,
                        targetUsername: username
                    })
                });

                const data = await response.json();
                
                if (data.success) {
                    alert('✅ ' + data.message);
                    loadUsers();
                } else {
                    alert('❌ ' + data.message);
                }
            } catch (error) {
                alert('❌ İşlem başarısız: ' + error.message);
            }
        }

        async function changeRole(username) {
            // Süper admin kontrolü
            const currentUsername = localStorage.getItem('h_sound_username');
            const currentUserRole = localStorage.getItem('h_sound_role') || 'user';
            
            // Hedef kullanıcının rolünü kontrol et
            const targetUser = users.find(u => u.username === username);
            
            // Hakan'ın rolü değiştirilemez
            if (username === 'Hakan') {
                alert('❌ Sistem sahibinin (Hakan) rolü değiştirilemez!');
                return;
            }
            
            // Admin kendi rolünü değiştiremez
            if (username === currentUsername && currentUserRole === 'admin') {
                alert('❌ Kendi rolünüzü değiştiremezsiniz!');
                return;
            }
            
            // Sadece superadmin diğer adminlerin rolünü değiştirebilir
            if (targetUser && (targetUser.role === 'admin' || targetUser.role === 'superadmin')) {
                if (currentUserRole !== 'superadmin') {
                    alert('❌ Sadece süper admin diğer adminlerin yetkilerini değiştirebilir!');
                    return;
                }
            }
            
            const newRole = prompt(`${username} için yeni rol:\n\nadmin - Yönetici\nuser - Kullanıcı\npremium - Premium Üye\nvip - VIP Üye`, 'user');
            if (!newRole || !['admin', 'user', 'premium', 'vip'].includes(newRole)) {
                alert('Geçersiz rol! Lütfen admin, user, premium veya vip yazın.');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/api/admin/change-role`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        adminUsername: adminCredentials.username,
                        adminPassword: adminCredentials.password,
                        targetUsername: username,
                        newRole
                    })
                });

                const data = await response.json();
                alert(data.message);
                if (data.success) loadUsers();
            } catch (error) {
                alert('İşlem başarısız!');
            }
        }

        async function changePassword(username) {
            const currentUserRole = localStorage.getItem('h_sound_role') || 'user';
            
            // Hedef kullanıcının rolünü kontrol et
            const targetUser = users.find(u => u.username === username);
            
            // Sadece superadmin herkesin şifresini değiştirebilir
            if (currentUserRole !== 'superadmin') {
                alert('❌ Sadece süper admin kullanıcı şifrelerini değiştirebilir!');
                return;
            }
            
            // Hakan'ın şifresi değiştirilemez
            if (username === 'Hakan') {
                alert('❌ Sistem sahibinin (Hakan) şifresi değiştirilemez!');
                return;
            }
            
            const newPassword = prompt(`${username} için yeni şifre:`);
            if (!newPassword) return;

            try {
                const response = await fetch(`${API_URL}/api/admin/change-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        adminUsername: adminCredentials.username,
                        adminPassword: adminCredentials.password,
                        targetUsername: username,
                        newPassword
                    })
                });

                const data = await response.json();
                
                if (data.success) {
                    alert('✅ ' + data.message);
                    loadUsers();
                } else {
                    alert('❌ ' + data.message);
                }
            } catch (error) {
                alert('❌ İşlem başarısız: ' + error.message);
            }
        }


    </script>
