<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>H-Sound Mobile</title>
    
    <!-- Mobile-First CSS Framework -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* Native Mobile App Stilleri */
        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow-x: hidden;
        }
        
        .mobile-container {
            max-width: 100vw;
            min-height: 100vh;
            background: #000;
            position: relative;
        }
        
        .status-bar {
            height: 44px;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            color: white;
            font-size: 14px;
            font-weight: 600;
        }
        
        .app-header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            padding: 20px;
            text-align: center;
            color: white;
        }
        
        .app-content {
            padding: 20px;
            min-height: calc(100vh - 200px);
        }
        
        .mobile-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin: 20px 0;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .mobile-input {
            width: 100%;
            padding: 15px 20px;
            border-radius: 25px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 16px;
            margin: 10px 0;
        }
        
        .mobile-input::placeholder {
            color: rgba(255,255,255,0.7);
        }
        
        .mobile-btn {
            width: 100%;
            padding: 15px;
            border-radius: 25px;
            border: none;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 18px;
            font-weight: 600;
            margin: 15px 0;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .mobile-btn:active {
            transform: scale(0.98);
        }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: rgba(0,0,0,0.9);
            display: flex;
            justify-content: space-around;
            align-items: center;
            backdrop-filter: blur(10px);
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: rgba(255,255,255,0.6);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .nav-item.active {
            color: #667eea;
        }
        
        .nav-item i {
            font-size: 24px;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="mobile-container">
        <!-- Status Bar (iOS/Android benzeri) -->
        <div class="status-bar">
            <span>9:41</span>
            <span>H-Sound</span>
            <span>100% <i class="fas fa-battery-full"></i></span>
        </div>
        
        <!-- App Header -->
        <div class="app-header">
            <h1 class="text-3xl font-bold">
                <i class="fas fa-music"></i> H-Sound
            </h1>
            <p class="text-sm opacity-80">Modern Müzik Deneyimi</p>
        </div>
        
        <!-- Main Content -->
        <div class="app-content">
            <div class="mobile-card">
                <h2 class="text-2xl font-bold text-white mb-6 text-center">Giriş Yap</h2>
                
                <div class="space-y-4">
                    <input type="text" class="mobile-input" placeholder="Kullanıcı Adı" id="username">
                    <input type="password" class="mobile-input" placeholder="Şifre" id="password">
                    
                    <button class="mobile-btn" onclick="handleLogin()">
                        <i class="fas fa-sign-in-alt mr-2"></i> Giriş Yap
                    </button>
                    
                    <button class="mobile-btn" style="background: rgba(255,255,255,0.1);" onclick="showRegister()">
                        <i class="fas fa-user-plus mr-2"></i> Kayıt Ol
                    </button>
                </div>
            </div>
            
            <!-- Quick Actions -->
            <div class="grid grid-cols-2 gap-4 mt-6">
                <div class="mobile-card text-center">
                    <i class="fas fa-headphones text-4xl text-blue-400 mb-3"></i>
                    <p class="text-white">Müzik Çal</p>
                </div>
                <div class="mobile-card text-center">
                    <i class="fas fa-download text-4xl text-green-400 mb-3"></i>
                    <p class="text-white">İndir</p>
                </div>
            </div>
        </div>
        
        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <div class="nav-item active">
                <i class="fas fa-home"></i>
                <span>Ana Sayfa</span>
            </div>
            <div class="nav-item">
                <i class="fas fa-search"></i>
                <span>Ara</span>
            </div>
            <div class="nav-item">
                <i class="fas fa-heart"></i>
                <span>Favoriler</span>
            </div>
            <div class="nav-item">
                <i class="fas fa-user"></i>
                <span>Profil</span>
            </div>
        </div>
    </div>
    
    <script>
        // Capacitor Native API'leri
        document.addEventListener('deviceready', onDeviceReady, false);
        
        function onDeviceReady() {
            console.log('Capacitor hazır!');
            // Native özellikler burada kullanılabilir
        }
        
        function handleLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
                showNativeAlert('Lütfen tüm alanları doldurun!');
                return;
            }
            
            // Firebase login işlemi
            console.log('Giriş yapılıyor:', username);
            window.location.href = 'music-player.html';
        }
        
        function showNativeAlert(message) {
            // Native alert kullan
            if (window.Capacitor) {
                // Capacitor alert plugin
                alert(message);
            } else {
                alert(message);
            }
        }
        
        // Touch gestures
        let touchStartY = 0;
        document.addEventListener('touchstart', (e) => {
            touchStartY = e.touches[0].clientY;
        });
        
        document.addEventListener('touchmove', (e) => {
            const touchY = e.touches[0].clientY;
            const diff = touchStartY - touchY;
            
            // Pull to refresh benzeri özellikler eklenebilir
        });
        
        // Haptic feedback (titreşim)
        function hapticFeedback() {
            if (navigator.vibrate) {
                navigator.vibrate(50);
            }
        }
        
        // Button'lara haptic feedback ekle
        document.querySelectorAll('.mobile-btn').forEach(btn => {
            btn.addEventListener('touchstart', hapticFeedback);
        });
    </script>
</body>
</html>
